name: SonarCloud Analysis

# 本流水线在 CI 中完整执行：构建（--coverage）→ 运行测试 → 生成 coverage.xml → SonarCloud 扫描。
# 本地生成 coverage.xml 的方法参见 scripts/run-coverage.sh。

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  QT_VERSION: "6.10.2"
  QTC_SOURCE_BASE_MAC: "https://download.qt.io/official_releases/qtcreator/19.0/19.0.0/installer_source/mac_x64"

jobs:
  sonarcloud:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud 需要完整历史以进行 blame / new-code 分析

      - name: Install build dependencies
        run: brew install ninja p7zip

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: desktop
          arch: clang_64
          modules: "qtwebsockets"
          cache: true

      - name: Download and extract Qt Creator 19 (runtime + dev SDK)
        env:
          QTC_BASE: ${{ env.QTC_SOURCE_BASE_MAC }}
        run: |
          set -eu
          mkdir -p qtcreator-dev
          for arc in qtcreator.7z qtcreator_dev.7z; do
            echo "Downloading ${arc}..."
            curl -fSL --retry 3 --retry-delay 10 -o "${arc}" "${QTC_BASE}/${arc}"
            7z x "${arc}" -oqtcreator-dev -y
            rm -f "${arc}"
          done

      - name: Locate Qt Creator CMake prefix
        id: qtc
        run: |
          set -eu
          DEV="${GITHUB_WORKSPACE}/qtcreator-dev"
          CONFIG=$(find "${DEV}" -name QtCreatorConfig.cmake 2>/dev/null | head -n 1 || true)
          if [ -z "${CONFIG}" ]; then
            echo "QtCreatorConfig.cmake not found under qtcreator-dev" >&2
            exit 1
          fi
          QTC_ROOT=$(cd "$(dirname "${CONFIG}")/../../.." && pwd)
          echo "root=${QTC_ROOT}" >> "${GITHUB_OUTPUT}"
          echo "Qt Creator CMake prefix: ${QTC_ROOT}"

      - name: Build
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DQtCreator='${{ steps.qtc.outputs.root }}' \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -G Ninja
          cmake --build build --parallel

      - name: Reset stale CFamily AutoScan properties
        # 清除服务端遗留的 customTargetSystem=windows 等 AutoScan 属性。
        # 这些属性由旧的 Automatic Analysis 写入，在 Compile-Commands 模式下会导致冲突。
        # 忽略非 2xx 响应（token 无 Administer 权限时跳过，不影响主流程）。
        run: |
          http_code=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://sonarcloud.io/api/settings/reset" \
            -H "Authorization: Bearer ${{ secrets.SONAR_TOKEN }}" \
            --data-urlencode "component=liys-online_qtc-for-harmonyos" \
            --data-urlencode "keys=sonar.cfamily.customTargetSystem,sonar.cfamily.customTargetArch,sonar.cfamily.customTargetVendor,sonar.cfamily.customTargetEnv")
          echo "settings/reset HTTP status: ${http_code}"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.cfamily.compile-commands=build/compile_commands.json
            -Dsonar.coverageReportPaths=coverage.xml

