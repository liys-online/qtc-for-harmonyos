
name: QTC For HarmonyOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  QT_VERSION: "6.8.3"
  # 必须同时解压：qtcreator.7z（运行时 + Frameworks，含 KSyntaxHighlighting 等）
  # 与 qtcreator_dev.7z（CMake/头文件等）；仅 dev 包会导致 QtCreatorTargets.cmake 引用缺失的 dylib。
  QTC_SOURCE_BASE_MAC: "https://download.qt.io/official_releases/qtcreator/19.0/19.0.0/installer_source/mac_x64"
  QTC_SOURCE_BASE_LINUX: "https://download.qt.io/official_releases/qtcreator/19.0/19.0.0/installer_source/linux_x64"
  QTC_SOURCE_BASE_WIN: "https://download.qt.io/official_releases/qtcreator/19.0/19.0.0/installer_source/windows_x64"

jobs:
  # Apple Silicon 官方 runner 上无 mac_arm64 的 installer_source；mac_x64 包在 arm 上可能链接失败。
  # 主 CI 放在 Linux；本 job 用于在 Intel mac 或需验证 mac 包时保留。
  build-mac:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ninja and 7-Zip
        run: brew install ninja p7zip

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: desktop
          arch: clang_64
          modules: "qtwebsockets"
          cache: true

      - name: Download and extract Qt Creator 19 (runtime + dev SDK)
        env:
          QTC_BASE: ${{ env.QTC_SOURCE_BASE_MAC }}
        run: |
          set -eu
          mkdir -p qtcreator-dev
          for arc in qtcreator.7z qtcreator_dev.7z; do
            echo "Downloading ${arc}..."
            curl -fSL --retry 3 --retry-delay 10 -o "${arc}" "${QTC_BASE}/${arc}"
            if command -v 7zz >/dev/null 2>&1; then
              7zz x "${arc}" -oqtcreator-dev -y
            elif command -v 7z >/dev/null 2>&1; then
              7z x "${arc}" -oqtcreator-dev -y
            elif command -v 7za >/dev/null 2>&1; then
              7za x "${arc}" -oqtcreator-dev -y
            else
              echo "No 7-Zip CLI found" >&2
              exit 1
            fi
            rm -f "${arc}"
          done

      - name: Locate Qt Creator CMake prefix
        id: qtc
        run: |
          set -eu
          DEV="${GITHUB_WORKSPACE}/qtcreator-dev"
          PREFERRED="${DEV}/Qt Creator.app/Contents/Resources/lib/cmake/QtCreator/QtCreatorConfig.cmake"
          if [ -f "${PREFERRED}" ]; then
            CONFIG="${PREFERRED}"
          else
            CONFIG=$(find "${DEV}" -path "*Qt Creator.app*" -name QtCreatorConfig.cmake 2>/dev/null | head -n 1 || true)
            if [ -z "${CONFIG}" ]; then
              CONFIG=$(find "${DEV}" -name QtCreatorConfig.cmake 2>/dev/null | head -n 1 || true)
            fi
          fi
          if [ -z "${CONFIG}" ]; then
            echo "QtCreatorConfig.cmake not found under qtcreator-dev" >&2
            exit 1
          fi
          QTC_ROOT=$(cd "$(dirname "${CONFIG}")/../../.." && pwd)
          {
            echo "root<<__QTC_ROOT_EOF__"
            printf '%s\n' "${QTC_ROOT}"
            echo "__QTC_ROOT_EOF__"
          } >> "${GITHUB_OUTPUT}"
          echo "Qt Creator CMake prefix: ${QTC_ROOT}"

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DQtCreator='${{ steps.qtc.outputs.root }}' \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtc4harmony-QtCreator-19.0.0-macos
          path: |
            build/**/libHarmony.dylib

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build p7zip-full

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: desktop
          arch: linux_gcc_64
          modules: "qtwebsockets"
          cache: true

      - name: Download and extract Qt Creator 19 (runtime + dev SDK)
        env:
          QTC_BASE: ${{ env.QTC_SOURCE_BASE_LINUX }}
        run: |
          set -eu
          mkdir -p qtcreator-dev
          for arc in qtcreator.7z qtcreator_dev.7z; do
            echo "Downloading ${arc}..."
            curl -fSL --retry 3 --retry-delay 10 -o "${arc}" "${QTC_BASE}/${arc}"
            7z x "${arc}" -oqtcreator-dev -y
            rm -f "${arc}"
          done

      - name: Locate Qt Creator CMake prefix
        id: qtc
        run: |
          set -eu
          DEV="${GITHUB_WORKSPACE}/qtcreator-dev"
          CONFIG=$(find "${DEV}" -name QtCreatorConfig.cmake 2>/dev/null | head -n 1 || true)
          if [ -z "${CONFIG}" ]; then
            echo "QtCreatorConfig.cmake not found under qtcreator-dev" >&2
            exit 1
          fi
          QTC_ROOT=$(cd "$(dirname "${CONFIG}")/../../.." && pwd)
          {
            echo "root<<__QTC_ROOT_EOF__"
            printf '%s\n' "${QTC_ROOT}"
            echo "__QTC_ROOT_EOF__"
          } >> "${GITHUB_OUTPUT}"
          echo "Qt Creator CMake prefix: ${QTC_ROOT}"

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DQtCreator='${{ steps.qtc.outputs.root }}' \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtc4harmony-QtCreator-19.0.0-linux
          path: |
            build/**/libHarmony.so

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Ninja and 7-Zip
        run: choco install ninja 7zip -y --no-progress

      - name: Add 7-Zip to PATH
        run: echo "/c/Program Files/7-Zip" >> "$GITHUB_PATH"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: desktop
          arch: win64_msvc2022_64
          modules: "qtwebsockets"
          cache: true

      - name: Download and extract Qt Creator 19 (runtime + dev SDK)
        env:
          QTC_BASE: ${{ env.QTC_SOURCE_BASE_WIN }}
        run: |
          set -eu
          mkdir -p qtcreator-dev
          for arc in qtcreator.7z qtcreator_dev.7z; do
            echo "Downloading ${arc}..."
            curl -fSL --retry 3 --retry-delay 10 -o "${arc}" "${QTC_BASE}/${arc}"
            7z x "${arc}" -oqtcreator-dev -y
            rm -f "${arc}"
          done

      - name: Locate Qt Creator CMake prefix
        id: qtc
        run: |
          set -eu
          DEV="${GITHUB_WORKSPACE}/qtcreator-dev"
          CONFIG=$(find "${DEV}" -name QtCreatorConfig.cmake 2>/dev/null | head -n 1 || true)
          if [ -z "${CONFIG}" ]; then
            echo "QtCreatorConfig.cmake not found under qtcreator-dev" >&2
            exit 1
          fi
          QTC_ROOT_WIN=$(cd "$(dirname "${CONFIG}")/../../.." && pwd -W)
          {
            echo "root<<__QTC_ROOT_EOF__"
            printf '%s\n' "${QTC_ROOT_WIN}"
            echo "__QTC_ROOT_EOF__"
          } >> "${GITHUB_OUTPUT}"
          echo "Qt Creator CMake prefix: ${QTC_ROOT_WIN}"

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DQtCreator="${{ steps.qtc.outputs.root }}" \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qtc4harmony-QtCreator-19.0.0-windows
          path: |
            build/**/Harmony.dll
            build/**/Harmony.lib
            build/**/Harmony.pdb
