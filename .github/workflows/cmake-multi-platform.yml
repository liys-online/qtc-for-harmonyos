
name: QTC For HarmonyOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  QT_VERSION: "6.8.3"
  # Qt Creator 19.0.0 插件开发包（x86_64）；需与 runs-on 架构一致
  QTC_DEV_URL: "https://download.qt.io/official_releases/qtcreator/19.0/19.0.0/installer_source/mac_x64/qtcreator_dev.7z"

jobs:
  build:
    # 官方提供的 mac_x64 包为 Intel；若该镜像下线，可改为 macos-14+ 并换用 installer_source 下的 mac_arm64 包
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ninja and 7-Zip
        run: brew install ninja p7zip

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          target: desktop
          arch: clang_64
          cache: true

      - name: Download Qt Creator 19 dev (plugin SDK)
        run: |
          curl -fSL --retry 3 --retry-delay 10 \
            -o qtcreator_dev.7z \
            "${{ env.QTC_DEV_URL }}"
          mkdir -p qtcreator-dev
          # Homebrew p7zip 提供的是 7z/7za；部分环境为 7zz（sevenzip 公式）
          if command -v 7zz >/dev/null 2>&1; then
            7zz x qtcreator_dev.7z -oqtcreator-dev -y
          elif command -v 7z >/dev/null 2>&1; then
            7z x qtcreator_dev.7z -oqtcreator-dev -y
          elif command -v 7za >/dev/null 2>&1; then
            7za x qtcreator_dev.7z -oqtcreator-dev -y
          else
            echo "No 7-Zip CLI (7zz/7z/7za) on PATH after brew install p7zip" >&2
            exit 1
          fi

      - name: Locate Qt Creator CMake prefix
        id: qtc
        run: |
          set -eu
          DEV="${GITHUB_WORKSPACE}/qtcreator-dev"
          # 优先主 .app 内的 SDK（避免命中包内嵌套的其它 QtCreatorConfig.cmake）
          PREFERRED="${DEV}/Qt Creator.app/Contents/Resources/lib/cmake/QtCreator/QtCreatorConfig.cmake"
          if [ -f "${PREFERRED}" ]; then
            CONFIG="${PREFERRED}"
          else
            CONFIG=$(find "${DEV}" -path "*Qt Creator.app*" -name QtCreatorConfig.cmake 2>/dev/null | head -n 1 || true)
            if [ -z "${CONFIG}" ]; then
              CONFIG=$(find "${DEV}" -name QtCreatorConfig.cmake 2>/dev/null | head -n 1 || true)
            fi
          fi
          if [ -z "${CONFIG}" ]; then
            echo "QtCreatorConfig.cmake not found under qtcreator-dev" >&2
            exit 1
          fi
          # .../PREFIX/lib/cmake/QtCreator/QtCreatorConfig.cmake -> PREFIX 在 lib/cmake/QtCreator 之上 3 级
          QTC_ROOT=$(cd "$(dirname "${CONFIG}")/../../.." && pwd)
          # 路径含空格（Qt Creator.app），必须用多行输出写入 GITHUB_OUTPUT
          {
            echo "root<<__QTC_ROOT_EOF__"
            printf '%s\n' "${QTC_ROOT}"
            echo "__QTC_ROOT_EOF__"
          } >> "${GITHUB_OUTPUT}"
          echo "Qt Creator CMake prefix: ${QTC_ROOT}"

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}" \
            -DQtCreator='${{ steps.qtc.outputs.root }}' \
            -G Ninja

      - name: Build
        run: cmake --build build --parallel
