sonar.organization=liys-online
sonar.projectKey=liys-online_qtc-for-harmonyos
sonar.sources=src,lib
sonar.exclusions=scripts/lldbbridge.py,src/Harmony_zh_CN.ts,test/**
sonar.sourceEncoding=UTF-8

# 不做 C/C++ 代码缺陷分析（需要 build-wrapper），只导入通用覆盖率报告。
# 禁用 CFamily 传感器以避免 "compile-commands not specified" 报错。
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-

# sonar.cfamily.compile-commands 和 sonar.coverageReportPaths 由 sonarcloud.yml 中
# sonarqube-scan-action 的 args 传入（CI 实时生成），无需在此硬编码路径。

